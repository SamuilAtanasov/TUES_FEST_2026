<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forum</title>
</head>

<body>
    <h1>Forum Messages</h1>

    {% for msg in messages %}
        <p><strong>{{msg.username}}:</strong>{{msg.text}} <br>
        <small>{{msg.date}}</small></p>
        <hr>
    {% empty %}
       <p>No messages yet.</p>
    {% endfor %}     
</body>
</html>
