{% extends 'main/base.html' %}

{% block content %}
<section class="section">
    <h2>Edit Message</h2>

    <form method="post">
        {% csrf_token %}
        <textarea name="text" rows="5">{{ message.text }}</textarea>
        <br>
        <button type="submit">Save</button>
    </form>
</section>
{% endblock %}
