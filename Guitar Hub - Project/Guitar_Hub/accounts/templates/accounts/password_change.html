{% extends 'main/base.html' %}

{% block content %}
<div class="section">
    <h2>Change Password</h2>

    <form method="post">
        {% csrf_token %}

        <!-- Show non-field errors (e.g., password mismatch) -->
        {{ form.non_field_errors }}

        <!-- Show field-specific errors -->
        {% for field in form %}
            <p>
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div style="color:red; font-size:14px;">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </p>
        {% endfor %}
        
        <button type="submit" id="save-btn">Update Password</button>
    </form>

</div>
{% endblock %}
