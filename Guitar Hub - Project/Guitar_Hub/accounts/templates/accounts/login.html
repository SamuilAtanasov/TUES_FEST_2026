{% extends 'main/base.html' %}

{% block content %}
<section class="section">

<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}

    <button type="submit" id="save-btn">Log in</button>
</form>
</section>
{% endblock %}
